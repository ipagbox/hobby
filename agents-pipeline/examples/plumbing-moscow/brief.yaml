# Демо-бриф: Сантехника Мастер, Москва
# Используется для тестирования pipeline
# Запуск: python scripts/run.py init --brief examples/plumbing-moscow/brief.yaml

project_type: "local_business_website"

business:
  name: "Сантехника Мастер"
  type: "Сантехнические услуги"
  city: "Москва"
  district: "Юго-Западный административный округ"
  description: >
    Бригада из 3 опытных мастеров-сантехников. Работаем по всей Москве.
    Основные услуги: монтаж и замена труб, установка и ремонт сантехники,
    устранение засоров и течей, установка водяных фильтров, работа с тёплыми
    полами. Стаж работы 8 лет, более 500 выполненных объектов.

goals:
  primary: "Генерация заявок через сайт (звонки и форма обратной связи)"
  secondary: "Формирование доверия через портфолио работ и отзывы клиентов"

constraints:
  budget: "low"
  timeline: "2 weeks"
  tech: "static site preferred, no CMS needed"

notes: >
  Клиент хочет простой сайт. Нет необходимости в CMS.
  Важно чтобы телефон был виден сразу. Работают без выходных.
